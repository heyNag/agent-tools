name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: python -m pip install --upgrade pip pytest

      - name: Run tests
        run: python -m pytest

      - name: Syntax check scripts
        run: python -m py_compile packages/watch-video/scripts/*.py

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Build MCP placeholder
        run: |
          if [ -f mcp/watch-video/package.json ]; then
            npm --prefix mcp/watch-video ci
            npm --prefix mcp/watch-video run build
          fi
