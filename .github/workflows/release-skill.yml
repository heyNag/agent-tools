name: Release Skill

on:
  workflow_dispatch:
    inputs:
      skill:
        description: Skill/package to release, for example watch-video
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-skill
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Bump selected skill version
        id: bump
        env:
          SKILL: ${{ inputs.skill }}
        run: |
          version="$(python3 scripts/bump-skill-version.py "${SKILL}")"
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "Released version: ${version}"

      - name: Sync umbrella manifest versions
        run: python3 scripts/sync-umbrella-version.py

      - name: Release readiness check
        run: make release-check

      - name: Stage expected release outputs
        env:
          SKILL: ${{ inputs.skill }}
        run: git add "packages/${SKILL}/.claude-plugin/plugin.json" .claude-plugin/marketplace.json skillshare-hub.json package.json pyproject.toml .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json

      - name: Verify source indexes are current
        run: make verify-source-clean

      - name: Check whitespace
        run: git diff --cached --check

      - name: Commit release
        id: commit
        env:
          SKILL: ${{ inputs.skill }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "packages/${SKILL}/.claude-plugin/plugin.json" .claude-plugin/marketplace.json skillshare-hub.json package.json pyproject.toml .claude-plugin/plugin.json .codex-plugin/plugin.json .cursor-plugin/plugin.json
          if git diff --cached --quiet; then
            echo "No release changes to commit."
            exit 1
          fi
          git commit -m "Release ${SKILL} ${VERSION}"

          # Push, tolerating a concurrent release that advanced the branch. The
          # release commit derives entirely from one source change (this skill's
          # version bump); the only files that can collide are the generated
          # indexes and umbrella versions, which are regenerated deterministically
          # from package sources. On rejection, rebase onto the new tip and
          # rebuild to resolve any index/umbrella conflict, then retry the push.
          pushed=false
          for attempt in 1 2 3 4 5; do
            if git push origin "HEAD:${GITHUB_REF_NAME}"; then
              pushed=true
              break
            fi
            echo "push rejected (attempt ${attempt}/5); rebasing onto latest ${GITHUB_REF_NAME}"
            git fetch origin "${GITHUB_REF_NAME}"
            if ! git rebase "origin/${GITHUB_REF_NAME}"; then
              ./scripts/build-packages.sh >/dev/null
              python3 scripts/sync-umbrella-version.py
              git add -A
              GIT_EDITOR=true git rebase --continue
            fi
          done

          if [ "${pushed}" != "true" ]; then
            echo "Failed to push release after retries." >&2
            exit 1
          fi

          commit_sha="$(git rev-parse HEAD)"
          echo "commit_sha=${commit_sha}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          SKILL: ${{ inputs.skill }}
          VERSION: ${{ steps.bump.outputs.version }}
          COMMIT_SHA: ${{ steps.commit.outputs.commit_sha }}
        run: |
          tag="${SKILL}@${VERSION}"
          title="${SKILL} ${VERSION}"
          notes_file="$(mktemp)"
          cat > "${notes_file}" <<EOF
          Public skill release for \`${SKILL}\`.

          Version: \`${VERSION}\`
          Source: \`packages/${SKILL}\`

          Source package:

          - \`packages/${SKILL}\`

          When this skill targets Claude Desktop / claude.ai, a ready-to-upload
          custom-skill ZIP is attached to this release. It can also be built
          locally with:

          - \`make build-packages\`

          Install/update details are in \`docs/updating-a-skill.md\`.
          EOF

          gh release create "${tag}" \
            --title "${title}" \
            --notes-file "${notes_file}" \
            --target "${COMMIT_SHA}" \
            --latest=false

      - name: Attach Claude Desktop custom-skill artifact
        env:
          GH_TOKEN: ${{ github.token }}
          SKILL: ${{ inputs.skill }}
          VERSION: ${{ steps.bump.outputs.version }}
        run: |
          artifact_dir=".dist/claude/custom-skills/${SKILL}"
          if [ ! -d "${artifact_dir}" ]; then
            echo "No Claude Desktop artifact for ${SKILL}; skipping upload."
            exit 0
          fi
          zip_name="${SKILL}-claude-custom-skill-${VERSION}.zip"
          (cd .dist/claude/custom-skills && zip -qr "${zip_name}" "${SKILL}")
          gh release upload "${SKILL}@${VERSION}" ".dist/claude/custom-skills/${zip_name}"
